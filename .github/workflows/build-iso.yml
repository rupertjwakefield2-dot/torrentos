name: Build TorrentOS ISO

on:
  workflow_dispatch:        # manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:                  # only rebuild when source actually changes
      - 'archiso/**'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/build-iso.yml'
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest   # x86_64 — required for Arch Linux / mkarchiso
    timeout-minutes: 120
    permissions:
      contents: write        # needed to attach files to a Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          ver=$(grep '^TORRENTOS_VERSION=' archiso/airootfs/etc/torrentos/version \
                | cut -d= -f2 | tr -d '"')
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Building TorrentOS v${ver}"

      # Pull the Arch Linux image once so the timer doesn't count against the build
      - name: Pull Arch Linux image
        run: docker pull archlinux:latest

      # Run the entire build inside an Arch Linux container with --privileged
      # (mkarchiso needs loop devices to mount the squashfs image).
      - name: Build ISO inside Arch Linux container
        run: |
          docker run --rm \
            --privileged \
            --volume "${{ github.workspace }}:/workspace" \
            --workdir /workspace \
            archlinux:latest \
            bash /workspace/scripts/ci-build.sh

      - name: List built artifacts
        run: ls -lh out/

      - name: Compute checksums
        run: |
          cd out
          sha256sum *.iso > SHA256SUMS
          cat SHA256SUMS

      # Upload ISO as a workflow artifact (downloadable from the Actions tab for 30 days)
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrentos-${{ steps.version.outputs.version }}-x86_64
          path: |
            out/*.iso
            out/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
          compression-level: 0   # ISO is already compressed; skip re-compression

      # -----------------------------------------------------------------------
      # Upload to Internet Archive for permanent, free, direct-download hosting.
      # Requires two GitHub secrets:
      #   IA_ACCESS_KEY  — your archive.org S3 access key
      #   IA_SECRET_KEY  — your archive.org S3 secret key
      # Get them at: https://archive.org/account/s3.php  (free account required)
      # Add them at: GitHub repo → Settings → Secrets → Actions
      # -----------------------------------------------------------------------
      - name: Upload ISO to Internet Archive
        if: github.event_name == 'release' && env.IA_ACCESS_KEY != ''
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pip install --quiet internetarchive
          ITEM="torrentos-${VERSION}-x86_64"
          ia upload "$ITEM" \
            out/torrentos-${VERSION}-x86_64.iso \
            out/SHA256SUMS \
            --access-key "$IA_ACCESS_KEY" \
            --secret-key "$IA_SECRET_KEY" \
            --metadata="mediatype:software" \
            --metadata="title:TorrentOS ${VERSION} (x86_64 ISO)" \
            --metadata="description:TorrentOS ${VERSION} — Arch-based Linux with Hyprland, built for downloading. Direct ISO download." \
            --metadata="subject:linux;operating system;arch linux;hyprland;wayland;torrentos" \
            --metadata="licenseurl:https://www.gnu.org/licenses/gpl-3.0.html" \
            --metadata="creator:TorrentOS" \
            --no-derive
          echo "✅ ISO uploaded → https://archive.org/download/${ITEM}/torrentos-${VERSION}-x86_64.iso"

      # Split ISO into <1.9 GB chunks and attach both to the GitHub Release.
      # Users reassemble with: cat torrentos-*.part* > torrentos.iso
      # (GitHub's release asset limit is 2 GB; the ISO is ~3.9 GB)
      - name: Split ISO and attach to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd out
          ISO="torrentos-${VERSION}-x86_64.iso"

          # Split into 1900 MB chunks
          split -b 1900m "$ISO" "${ISO}.part"
          ls -lh ${ISO}.part*

          # Rename to friendly names: .partaa → .part1, .partab → .part2, etc.
          i=1
          for f in $(ls ${ISO}.part* | sort); do
            mv "$f" "${ISO}.part${i}"
            i=$((i+1))
          done

          # Write reassembly readme
          PARTS=$(ls ${ISO}.part* | wc -l)
          cat > REASSEMBLE.txt <<EOF
          TorrentOS ${VERSION} ISO — split download
          ==========================================
          The ISO was split into ${PARTS} parts due to GitHub's 2 GB file limit.

          To reassemble on Linux / macOS:
            cat ${ISO}.part* > ${ISO}
            sha256sum -c SHA256SUMS

          To reassemble on Windows (PowerShell):
            Get-Content ${ISO}.part1,${ISO}.part2 -Raw | Set-Content ${ISO} -AsByteStream

          Then flash with Rufus (DD mode) or Balena Etcher.
          EOF

          gh release upload "${{ github.ref_name }}" \
            ${ISO}.part* \
            SHA256SUMS \
            REASSEMBLE.txt \
            --clobber
