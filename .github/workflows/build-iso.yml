name: Build TorrentOS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write     # to attach ISO to a release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build inside Arch container
        uses: docker://archlinux:latest
        with:
          entrypoint: bash
          args: |
            -ec '
              set -euo pipefail

              echo "::group::Installing build deps"
              pacman-key --init
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm
              pacman -S --needed --noconfirm \
                archiso base-devel git sudo imagemagick

              echo "::group::Creating builder user (makepkg refuses root)"
              useradd -m -G wheel builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              chown -R builder:builder /github/workspace

              echo "::group::Generating wallpaper"
              cd /github/workspace
              if [ ! -f packages/torrentos-theme/wallpaper.png ]; then
                convert -size 3840x2160 \
                  gradient:"#0A1628-#1E6FFF" -blur 0x80 \
                  packages/torrentos-theme/wallpaper.png || true
              fi

              echo "::group::Building custom packages"
              sudo -u builder ./scripts/build-pkgs.sh

              echo "::group::Building ISO"
              ./scripts/build-iso.sh
            '

      - name: List artifacts
        run: ls -lh out/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: torrentos-iso
          path: out/*.iso
          if-no-files-found: error
          retention-days: 30

      - name: Upload SHA256
        run: cd out && sha256sum *.iso > SHA256SUMS && cat SHA256SUMS

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.iso
            out/SHA256SUMS
