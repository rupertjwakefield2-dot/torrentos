name: Build TorrentOS ISO

on:
  workflow_dispatch:        # manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:                  # only rebuild when source actually changes
      - 'archiso/**'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/build-iso.yml'
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest   # x86_64 — required for Arch Linux / mkarchiso
    timeout-minutes: 120
    permissions:
      contents: write        # needed to attach files to a Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          ver=$(grep '^TORRENTOS_VERSION=' archiso/airootfs/etc/torrentos/version \
                | cut -d= -f2 | tr -d '"')
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Building TorrentOS v${ver}"

      # Pull the Arch Linux image once so the timer doesn't count against the build
      - name: Pull Arch Linux image
        run: docker pull archlinux:latest

      # Run the entire build inside an Arch Linux container with --privileged
      # (mkarchiso needs loop devices to mount the squashfs image).
      - name: Build ISO inside Arch Linux container
        run: |
          docker run --rm \
            --privileged \
            --volume "${{ github.workspace }}:/workspace" \
            --workdir /workspace \
            archlinux:latest \
            bash /workspace/scripts/ci-build.sh

      - name: List built artifacts
        run: ls -lh out/

      - name: Compute checksums
        run: |
          cd out
          sha256sum *.iso > SHA256SUMS
          cat SHA256SUMS

      # Upload ISO as a workflow artifact (downloadable from the Actions tab)
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrentos-${{ steps.version.outputs.version }}-x86_64
          path: |
            out/*.iso
            out/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
          compression-level: 0   # ISO is already compressed; skip re-compression

      # Also attach to a GitHub Release if this run was triggered by one
      - name: Attach ISO to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.iso
            out/SHA256SUMS
