<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- TorrentOS — font rendering configuration
     Optimised for Inter UI font on HiDPI and standard displays.
     Matches macOS subpixel rendering quality as closely as possible. -->
<fontconfig>

  <!-- ── Hinting & anti-aliasing ─────────────────────────────────────────── -->
  <match target="font">
    <edit name="antialias"   mode="assign"><bool>true</bool></edit>
    <edit name="hinting"     mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle"   mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"        mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter"   mode="assign"><const>lcddefault</const></edit>
    <edit name="autohint"    mode="assign"><bool>false</bool></edit>
    <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- ── Preferred font families ─────────────────────────────────────────── -->
  <!-- Sans-serif -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <!-- Serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>DejaVu Serif</family>
      <family>Liberation Serif</family>
    </prefer>
  </alias>

  <!-- Monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Noto Sans Mono</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <!-- ── Disable bitmap fonts for common families ──────────────────────── -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="scalable"><bool>false</bool></patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <!-- ── Inter: force slight hinting for best legibility ──────────────── -->
  <match target="font">
    <test name="family" compare="contains"><string>Inter</string></test>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"      mode="assign"><const>rgb</const></edit>
  </match>

  <!-- ── JetBrains Mono: no hinting needed (designed for screen) ────── -->
  <match target="font">
    <test name="family" compare="contains"><string>JetBrains</string></test>
    <edit name="hintstyle" mode="assign"><const>hintfull</const></edit>
  </match>

</fontconfig>
