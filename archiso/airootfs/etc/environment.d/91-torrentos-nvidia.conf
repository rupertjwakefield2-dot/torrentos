# TorrentOS — Wayland session environment
# Loaded by systemd-environment-d-generator for every user session.
#
# NVIDIA-specific vars (GBM_BACKEND, __GLX_VENDOR_LIBRARY_NAME,
# LIBVA_DRIVER_NAME, NVD_BACKEND, WLR_NO_HARDWARE_CURSORS) are NOT
# set here because they break Wayland on AMD/Intel.
# They are injected at runtime by torrentos-gpu-setup (exec-once in
# hyprland.conf) only when an NVIDIA GPU is detected.

# Electron apps (VS Code, Discord, etc.) — use Wayland natively
ELECTRON_OZONE_PLATFORM_HINT=auto

# Qt Wayland
QT_QPA_PLATFORM=wayland
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
