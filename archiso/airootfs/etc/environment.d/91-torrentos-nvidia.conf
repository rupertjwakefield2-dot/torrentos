# TorrentOS — NVIDIA Wayland environment variables
# These are loaded by systemd for every user session.
# They are safe no-ops on non-NVIDIA hardware.

# Use NVIDIA's GBM backend for Wayland buffer management
GBM_BACKEND=nvidia-drm

# Tell Mesa/EGL to use the NVIDIA vendor library
__GLX_VENDOR_LIBRARY_NAME=nvidia

# Hardware video decode via NVDEC
LIBVA_DRIVER_NAME=nvidia
NVD_BACKEND=direct

# Fix invisible cursor on NVIDIA + Wayland (hardware cursors unsupported)
WLR_NO_HARDWARE_CURSORS=1

# Electron apps (VS Code, Discord, etc.) — use Wayland natively
ELECTRON_OZONE_PLATFORM_HINT=auto

# Qt Wayland
QT_QPA_PLATFORM=wayland
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
