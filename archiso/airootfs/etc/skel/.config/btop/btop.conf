#? Config file for btop v. 1.3.x

#* Name of a btop++/bpytop/bashtop formatted ".theme" file, "Default" and "TTY" for built in themes.
color_theme = "Default"

#* If the theme set background should be shown, set to False if you want terminal background transparency.
theme_background = False

#* Sets if 24-bit truecolor should be used, will convert 24-bit colors to 256 color (6x6x6 color cube) if false.
truecolor = True

#* Rounded corners on boxes, is ignored if TTY mode is ON.
rounded_corners = True

#* Default symbols to use for graph creation, "braille", "block" or "tty".
graph_symbol = "braille"

#* Default symbols to use for graphs in cpu box.
graph_symbol_cpu = "default"

#* Default symbols to use for graphs in mem box.
graph_symbol_mem = "default"

#* Default symbols to use for graphs in net box.
graph_symbol_net = "default"

#* Default symbols to use for graphs in proc box.
graph_symbol_proc = "default"

#* Manually set which boxes to show. Available values are "cpu mem net proc" and "gpu0" through "gpu5",
boxes = "cpu mem net proc"

#* Update time in milliseconds, increases cpu usage at low values.
update_ms = 1500

#* Processes sorting, "pid" "program" "arguments" "threads" "user" "memory" "cpu lazy" "cpu direct".
proc_sorting = "cpu lazy"

#* Reverse sorting order, True or False.
proc_reversed = False

#* Show processes as a tree.
proc_tree = False

#* Use the cpu graph colors in the process list.
proc_colors = True

#* Use a darkening gradient in the process list.
proc_gradient = True

#* If process memory should be shown as "bytes" or "percent".
proc_mem_bytes = True

#* Use /proc/[pid]/smaps for memory information in the process info box (very slow!)
proc_info_smaps = False

#* Show proc box on left side of screen instead of right.
proc_left = False

#* (Linux) Filter processes tied to a process using cgroup2 by parsing /proc/[pid]/cgroup
proc_filter_kernel = False

#* In tree-view, always accumulate child process resources in the parent process.
proc_aggregate = False

#* Sets the CPU stat shown in the upper half of the cpu box, "total" = Total cpu usage, "some-core" = A specific core number 1-[cpu cores].
cpu_graph_upper = "total"

#* Sets the CPU stat shown in the lower half of the cpu box, "total" = Total cpu usage, "some-core" = A specific core number 1-[cpu cores].
cpu_graph_lower = "total"

#* Toggles if the CPU box should be shown, set to "false" to disable.
show_cpu_freq = True

#* Show current temperature in cpu box.
check_temp = True

#* Which sensor to use for cpu "current temp".
cpu_sensor = "Auto"

#* Show temperatures for cpu cores in cpu box.
show_coretemp = True

#* Set a custom mapping between core and coretemp, takes format "x:y" x=core, y=sensor.
cpu_core_map = ""

#* Which temperature scale to use, available values: "celsius", "fahrenheit", "kelvin", "rankine".
temp_scale = "celsius"

#* Use base 10 for bits and bytes sizes, KB = 1000 instead of KiB = 1024.
base_10_sizes = False

#* Show GPU info in cpu box (if supported).
show_gpu_info = "Auto"

#* Enable the memory box, set to False to disable.
mem_below_net = False

#* Set if swap memory should be shown in the mem box.
show_swap = True

#* Show swap as a disk in the disk list.
swap_disk = True

#* If mem box should be split to also show disks info.
show_disks = True

#* Filter out non-physical disks.
only_physical = True

#* Read values for disks in /media and /run/media.
use_fstab = True

#* Toggles if fstab entries should be formatted.
disk_free_prct = False

#* Set color gradient for net graphs. "true" = gradient, "false" = monochrome.
net_auto = True

#* Sync the auto scaling for download and upload to reflect the highest current value.
net_sync = True

#* Starts the clock timer.
clock_format = "%H:%M"

#* Update main ui in background when menus are shown, set this to false if the menus is flickering too much for comfort.
background_update = True

#* Custom cpu model name, empty string to disable.
custom_cpu_name = ""

#* Optional filter for listed disks, should be full path of a disk, separate multiple entries with whitespace " ".
disks_filter = ""

#* Show graphs instead of meters for memory values.
mem_graphs = True

#* Show mem box below net box instead of above.
show_io_stat = True

#* Toggle interleaved read and write disk io graphs.
io_mode = False

#* Set to True to show combined read+write io graphs in io mode.
io_combined = False

#* Set custom increment for scroll in process box.
proc_scroll_inc = 10

#* Show page faults in memory box.
page_faults = True

#* Show task count for each user in the process box.
show_taskbar_info = False

#* Toggle gpu memory stats in gpu box.
gpu_mirror_graph = True

#* Delay in ms before auto-hide starts for the battery status bar. Set to 0 to disable.
auto_battery_hide_delay = 60000
