################################################################################
#  TorrentOS — default Hyprland configuration
#  Aim: macOS-feel (blur, rounded corners, smooth bezier animations).
#  User overrides should go in ~/.config/hypr/user.conf (sourced at the bottom).
################################################################################

monitor = ,preferred,auto,1

# ---- environment ----
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
# NVIDIA-specific env vars are applied at runtime by torrentos-gpu-setup (see exec-once below)
# so they don't break VA-API on AMD/Intel systems.
# To manually force NVIDIA mode, add these to ~/.config/hypr/user.conf:
#   env = LIBVA_DRIVER_NAME,nvidia
#   env = GBM_BACKEND,nvidia-drm
#   env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#   env = NVD_BACKEND,direct
#   env = WLR_NO_HARDWARE_CURSORS,1

# ---- autostart ----
exec-once = torrentos-first-boot-wizard
exec-once = /usr/lib/torrentos/settingsd
exec-once = /usr/local/bin/torrentos-gpu-setup
exec-once = bash -c 'sleep 180 && torrentos-update-check'
exec-once = waybar
exec-once = swaync
exec-once = nwg-dock-hyprland -i 48 -mt 0 -mb 8 -ml 200 -mr 200 -p bottom -d -nolauncher
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard both
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = libinput-gestures-setup start
exec-once = xdg-user-dirs-update

# ---- look & feel ----
general {
    border_size = 1
    gaps_in = 5
    gaps_out = 10
    col.active_border   = rgba(1E6FFFff) rgba(5BC0EBff) 45deg
    col.inactive_border = rgba(0A1628aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
    snap {
        enabled = true
    }
}

decoration {
    rounding = 14

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        popups = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a2ecc)
        color_inactive = rgba(00000022)
    }

    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.04
}

animations {
    enabled = true

    # macOS-style curves
    bezier = myBezier,  0.05, 0.9, 0.1, 1.05
    bezier = mac,       0.05, 0.9, 0.1, 1.05
    bezier = macOut,    0.16, 1.0, 0.3, 1.0
    bezier = overshoot, 0.34, 1.56, 0.64, 1.0
    bezier = linear,    0.0, 0.0, 1.0, 1.0

    animation = windows,          1, 4, myBezier, popin 80%
    animation = windowsOut,       1, 3, macOut,   popin 80%
    animation = windowsMove,      1, 4, myBezier
    animation = border,           1, 8, default
    animation = borderangle,      1, 50, linear,  loop
    animation = fade,             1, 3, myBezier
    animation = fadeOut,          1, 3, macOut
    animation = workspaces,       1, 5, myBezier, slide
    animation = specialWorkspace, 1, 5, myBezier, slidevert
    animation = layers,           1, 3, myBezier, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ---- input ----
# kb_layout is set by the first-boot wizard in user.conf
# Default fallback is us — change it in ~/.config/hypr/user.conf
input {
    kb_layout = us
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    force_no_accel = false
    numlock_by_default = true
    repeat_rate = 50
    repeat_delay = 300

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
        disable_while_typing = true
        clickfinger_behavior = true
        tap-to-click = true
        drag_lock = true
        tap-and-drag = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 250
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.3
    workspace_swipe_create_new = false
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
    enable_swallow = true
    swallow_regex = ^(ghostty|Ghostty|kitty|alacritty|footclient)$
    focus_on_activate = true
    new_window_takes_over_fullscreen = 2
    allow_session_lock_restore = true
    close_special_on_empty = true
}

cursor {
    no_warps = false
    inactive_timeout = 5
    # NVIDIA: hardware cursors are broken on Wayland — forced off via env var too
    no_hardware_cursors = true
    allow_dumb_copy = true
}

xwayland {
    force_zero_scaling = true
}

################################################################################
#  KEYBINDS — Super = the "Cmd" key
################################################################################

$mod = SUPER

# ── Launcher / spotlight ─────────────────────────────────────────────────────
bind = $mod,        SPACE,  exec, rofi -show drun -theme ~/.config/rofi/torrentos.rasi
bind = $mod SHIFT,  SPACE,  exec, rofi -show run  -theme ~/.config/rofi/torrentos.rasi

# ── Core actions ─────────────────────────────────────────────────────────────
bind = $mod,        Q,      killactive
bind = $mod,        Return, exec, ghostty
bind = $mod SHIFT,  Return, exec, ghostty --class=ghostty-float
bind = $mod,        E,      exec, nautilus
bind = $mod,        comma,  exec, torrentos-settings
bind = $mod,        L,      exec, hyprlock
bind = $mod SHIFT,  Q,      exit
bind = $mod CTRL,   Q,      exec, ~/.config/rofi/power-menu.sh --rofi
# Note: Super+Ctrl+L is intentionally not mapped here — Super+L (hyprlock) handles locking
# and Super+Ctrl+L is used for window resize (binde below).

# ── Focus movement (vim-style H/J/K + arrow keys) ────────────────────────────
# Note: $mod, l is intentionally NOT mapped — it would conflict with $mod, L (hyprlock).
# Use $mod, RIGHT or $mod, l is mapped to movefocus right via arrow-key alias below.
bind = $mod, h,     movefocus, l
bind = $mod, j,     movefocus, d
bind = $mod, k,     movefocus, u
# Arrow key alternatives (also covers the missing 'l' direction)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = ALT,  Tab, cyclenext
bind = ALT SHIFT, Tab, cycleprev

# ── Window cycling (Super+Tab) ───────────────────────────────────────────────
bind = $mod,       Tab,       cyclenext
bind = $mod SHIFT, Tab,       cyclenext, prev

# ── Move windows ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# ── Resize windows ───────────────────────────────────────────────────────────
binde = $mod CTRL, h, resizeactive, -40 0
binde = $mod CTRL, l, resizeactive, 40 0
binde = $mod CTRL, k, resizeactive, 0 -40
binde = $mod CTRL, j, resizeactive, 0 40

# ── Layout ───────────────────────────────────────────────────────────────────
bind = $mod,       F,  fullscreen, 0
bind = $mod SHIFT, F,  fullscreen, 1
bind = $mod,       M,  fullscreen, 2
bind = $mod,       P,  exec, hyprpicker -a   # colour picker
bind = $mod SHIFT, P,  pseudo                # pseudotile toggle
bind = $mod,       S,  togglesplit
bind = $mod SHIFT, M,  fakefullscreen

# ── Floating toggle ───────────────────────────────────────────────────────────
bind = $mod ALT,   F,  togglefloating

# ── Workspaces 1–9 ───────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Scroll through workspaces with mouse wheel ────────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Scratchpad ("special workspace") — Mission-Control-ish ───────────────────
bind = $mod,       grave, togglespecialworkspace
bind = $mod SHIFT, grave, movetoworkspace, special

# ── Screenshots ──────────────────────────────────────────────────────────────
# Super+Shift+S → region select, save + copy  (quick, like macOS Cmd+Shift+4)
# Print         → copy full screen to clipboard
# Shift+Print   → region select, copy to clipboard
# Super+Print   → save full screen to ~/Pictures
# Super+Ctrl+S  → open Screenshot GUI (choose mode, delay, preview)
bind = $mod SHIFT, S,    exec, bash -c 'mkdir -p ~/Pictures/Screenshots; F=~/Pictures/Screenshots/Screenshot-$(date +%Y-%m-%d_%H-%M-%S).png; grim -g "$(slurp)" "$F" && wl-copy < "$F" && notify-send -i camera-photo "Screenshot saved" "Region saved to ~/Pictures/Screenshots"'
bind = ,          Print, exec, grim - | wl-copy && notify-send -i camera-photo "Screenshot" "Full screen copied to clipboard"
bind = SHIFT,     Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send -i camera-photo "Screenshot" "Region copied to clipboard"
bind = $mod,      Print, exec, bash -c 'mkdir -p ~/Pictures/Screenshots; F=~/Pictures/Screenshots/Screenshot-$(date +%Y-%m-%d_%H-%M-%S).png; grim "$F" && notify-send -i camera-photo "Screenshot saved" "Saved to ~/Pictures/Screenshots"'
bind = $mod CTRL, S,     exec, torrentos-screenshot

# ── Media keys ───────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f", $2*100}')" -h string:synchronous:volume "Volume" -t 1500
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f", $2*100}')" -h string:synchronous:volume "Volume" -t 1500
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Mouse binds ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Quick app shortcuts ───────────────────────────────────────────────────────
bind = $mod, B, exec, firefox
bind = $mod, T, exec, qbittorrent
bind = $mod, C, exec, code
bind = $mod, U, exec, torrentos-update-gui
bind = $mod, N, exec, swaync-client -t -sw   # notification centre
bind = $mod, X, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/torrentos.rasi | cliphist decode | wl-copy

# ── Accessibility ─────────────────────────────────────────────────────────────
# Magnus pixel magnifier — toggle with Super+= (zoom in area under cursor)
bind = $mod, equal, exec, bash -c 'pkill -x magnus || magnus'

################################################################################
#  Window rules
################################################################################

# ── TorrentOS apps ───────────────────────────────────────────────────────────
windowrulev2 = float,        class:^(org.torrentos.Settings)$
windowrulev2 = size 960 640, class:^(org.torrentos.Settings)$
windowrulev2 = center,       class:^(org.torrentos.Settings)$

windowrulev2 = float,        class:^(org.torrentos.Install)$
windowrulev2 = size 480 380, class:^(org.torrentos.Install)$
windowrulev2 = center,       class:^(org.torrentos.Install)$

windowrulev2 = float,        class:^(org.torrentos.Screenshot)$
windowrulev2 = size 420 600, class:^(org.torrentos.Screenshot)$
windowrulev2 = center,       class:^(org.torrentos.Screenshot)$

windowrulev2 = float,        class:^(org.torrentos.Update)$
windowrulev2 = size 720 520, class:^(org.torrentos.Update)$
windowrulev2 = center,       class:^(org.torrentos.Update)$

# First-boot wizard
windowrulev2 = float,         class:^(org.torrentos.FirstBoot)$
windowrulev2 = size 780 580,  class:^(org.torrentos.FirstBoot)$
windowrulev2 = center,        class:^(org.torrentos.FirstBoot)$
windowrulev2 = stayfocused,   class:^(org.torrentos.FirstBoot)$

# ── Floating system dialogs ───────────────────────────────────────────────────
windowrulev2 = float,         class:^(pavucontrol)$
windowrulev2 = size 700 450,  class:^(pavucontrol)$
windowrulev2 = center,        class:^(pavucontrol)$
windowrulev2 = float,         class:^(nm-connection-editor)$
windowrulev2 = float,         class:^(blueman-manager)$
windowrulev2 = size 600 480,  class:^(blueman-manager)$
windowrulev2 = center,        class:^(blueman-manager)$
windowrulev2 = float,         class:^(org.gnome.FileRoller)$
windowrulev2 = float,         class:^(org.gnome.Calendar)$
windowrulev2 = float,         class:^(org.gnome.Calculator)$
windowrulev2 = size 400 500,  class:^(org.gnome.Calculator)$
windowrulev2 = center,        class:^(org.gnome.Calculator)$
windowrulev2 = float,         title:^(Open Files?)$
windowrulev2 = float,         title:^(Save (File|As)?)$
windowrulev2 = float,         title:^(Preferences)$
windowrulev2 = float,         class:^(org.gnome.Characters)$
windowrulev2 = float,         class:^(org.gnome.font-viewer)$
windowrulev2 = float,         class:^(feh)$
windowrulev2 = float,         class:^(imv)$
windowrulev2 = float,         class:^(mpv)$
windowrulev2 = size 960 540,  class:^(mpv)$
windowrulev2 = center,        class:^(mpv)$

# ── btop system monitor ───────────────────────────────────────────────────────
# Launched via waybar with: ghostty --class=ghostty-btop -e btop
windowrulev2 = float,         class:^(ghostty-btop)$
windowrulev2 = size 1100 700, class:^(ghostty-btop)$
windowrulev2 = center,        class:^(ghostty-btop)$

# ── Steam ─────────────────────────────────────────────────────────────────────
windowrulev2 = float,         class:^(Steam)$,title:^(Friends List)$
windowrulev2 = float,         class:^(Steam)$,title:^(Screenshot Uploader)$
windowrulev2 = stayfocused,   class:^(Steam)$,title:^(Sign in to Steam)$
windowrulev2 = noblur,        class:^(Steam)$

# ── Picture-in-picture ────────────────────────────────────────────────────────
windowrulev2 = float,         title:^(Picture.in.Picture)$
windowrulev2 = pin,           title:^(Picture.in.Picture)$
windowrulev2 = size 480 270,  title:^(Picture.in.Picture)$
windowrulev2 = move 100%-490 50, title:^(Picture.in.Picture)$

# ── Terminal opacity ──────────────────────────────────────────────────────────
windowrulev2 = opacity 0.9 0.85, class:^(ghostty)$
windowrulev2 = opacity 0.95 0.90, class:^(Ghostty|kitty|alacritty|foot)$

# ── Float terminal (launched with ghostty-float class) ───────────────────────
windowrulev2 = float,        class:^(ghostty-float)$
windowrulev2 = size 800 500, class:^(ghostty-float)$
windowrulev2 = center,       class:^(ghostty-float)$
windowrulev2 = opacity 0.96, class:^(ghostty-float)$

# ── Performance / gaming ─────────────────────────────────────────────────────
windowrulev2 = noblur,        fullscreen:1
windowrulev2 = idleinhibit fullscreen, class:.*
windowrulev2 = immediate,     class:^(steam_app_[0-9]+)$

# ── Xwayland scaling fix ──────────────────────────────────────────────────────
windowrulev2 = xray 1, xwayland:1

################################################################################
#  Layer rules (for blurred panels and notifications)
################################################################################
layerrule = blur, waybar
layerrule = blur, rofi
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, rofi
layerrule = ignorezero, swaync-control-center

################################################################################
#  User overrides — edit ~/.config/hypr/user.conf, NOT this file.
#  This file is replaced on update.
################################################################################
source = ~/.config/hypr/user.conf
