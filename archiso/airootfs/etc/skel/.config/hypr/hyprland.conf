################################################################################
#  TorrentOS — default Hyprland configuration
#  Aim: macOS-feel (blur, rounded corners, smooth bezier animations).
#  User overrides should go in ~/.config/hypr/user.conf (sourced at the bottom).
################################################################################

monitor = ,preferred,auto,1

# ---- environment ----
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1
# Wayland session type (universal)
env = XDG_SESSION_TYPE,wayland
# NOTE: Nvidia kernel-module env vars (GBM_BACKEND, __GLX_VENDOR_LIBRARY_NAME, etc.)
# are NOT set here — the live ISO ships only nvidia-utils (userspace).
# After installing TorrentOS to disk and installing the nvidia/nvidia-dkms package,
# uncomment the lines below in your user.conf:
#   env = LIBVA_DRIVER_NAME,nvidia
#   env = GBM_BACKEND,nvidia-drm
#   env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#   env = NVD_BACKEND,direct

# ---- autostart ----
exec-once = waybar
exec-once = swaync
exec-once = nwg-dock-hyprland -i 48 -mt 0 -mb 8 -ml 200 -mr 200 -p bottom -d -nolauncher
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard both
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = libinput-gestures-setup start

# ---- look & feel ----
general {
    border_size = 1
    gaps_in = 6
    gaps_out = 12
    col.active_border   = rgba(1E6FFFff) rgba(5BC0EBff) 45deg
    col.inactive_border = rgba(0A1628aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
    }

    drop_shadow = true
    shadow_range = 24
    shadow_render_power = 3
    col.shadow = rgba(00000044)
    active_opacity   = 1.0
    inactive_opacity = 0.97
    fullscreen_opacity = 1.0
}

animations {
    enabled = true

    # macOS-style curves
    bezier = mac,        0.05, 0.9, 0.1, 1.05
    bezier = macOut,     0.16, 1.0, 0.3, 1.0
    bezier = overshoot,  0.34, 1.56, 0.64, 1.0

    animation = windows,        1, 5, mac,       popin 80%
    animation = windowsOut,     1, 4, macOut,    popin 80%
    animation = border,         1, 8, default
    animation = borderangle,    1, 50, default, loop
    animation = fade,           1, 4, mac
    animation = workspaces,     1, 6, mac,       slide
    animation = specialWorkspace, 1, 6, mac,     slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

master {
    new_status = master
}

# ---- input ----
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = adaptive

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
        disable_while_typing = true
        clickfinger_behavior = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 250
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.3
    workspace_swipe_create_new = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
    enable_swallow = true
    swallow_regex = ^(Ghostty|kitty|alacritty|footclient)$
    focus_on_activate = true
}

cursor {
    no_warps = true
    inactive_timeout = 5
    no_hardware_cursors = true
    use_cpu_buffer = true
}

################################################################################
#  KEYBINDS — Super = the "Cmd" key
################################################################################

$mod = SUPER

# launcher / spotlight
bind = $mod,        SPACE,  exec, rofi -show drun
bind = $mod SHIFT,  SPACE,  exec, rofi -show run

# core actions
bind = $mod,        Q,      killactive
bind = $mod,        Return, exec, ghostty
bind = $mod,        V,      exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod,        E,      exec, nautilus
bind = $mod,        comma,  exec, torrentos-settings
bind = $mod,        L,      exec, hyprlock
bind = $mod SHIFT,  Q,      exit

# focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = ALT, Tab, cyclenext

# move windows
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# layout
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod, P, pseudo
bind = $mod, S, togglesplit

# workspaces 1-9
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# scratchpad ("special workspace") — Mission-Control-ish
bind = $mod, grave, togglespecialworkspace
bind = $mod SHIFT, grave, movetoworkspace, special

# screenshots
bind = ,         Print,     exec, grim - | wl-copy
bind = SHIFT,    Print,     exec, grim -g "$(slurp)" - | wl-copy
bind = $mod,     Print,     exec, grim ~/Pictures/Screenshot-$(date +%F-%H%M%S).png

# media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

################################################################################
#  Window rules
################################################################################
windowrulev2 = float,         class:^(torrentos-settings)$
windowrulev2 = size 900 640,  class:^(torrentos-settings)$
windowrulev2 = center,        class:^(torrentos-settings)$
windowrulev2 = float,         class:^(org.torrentos.Install)$
windowrulev2 = size 480 380,  class:^(org.torrentos.Install)$
windowrulev2 = center,        class:^(org.torrentos.Install)$
windowrulev2 = float,         class:^(pavucontrol|blueman-manager|nm-connection-editor)$
windowrulev2 = opacity 0.95 0.90, class:^(Ghostty|kitty)$
windowrulev2 = noblur,        fullscreen:1
windowrulev2 = idleinhibit fullscreen, class:.*

################################################################################
#  User overrides — edit ~/.config/hypr/user.conf, NOT this file.
#  This file is replaced on update.
################################################################################
source = ~/.config/hypr/user.conf
