# TorrentOS — Hyprlock screen lock configuration
# Matches the TorrentOS dark navy / electric blue palette

general {
    disable_loading_bar  = false
    hide_cursor          = true
    grace                = 0
    no_fade_in           = false
    no_fade_out          = false
    ignore_empty_input   = true
}

# ── Wallpaper background (blurred) ──────────────────────────────────────────
background {
    monitor =
    path = /usr/share/torrentos/branding/wallpaper.png
    blur_passes = 3
    blur_size = 8
    contrast = 0.88
    brightness = 0.78
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

# ── Subtle dark overlay for better text legibility ───────────────────────────
background {
    monitor =
    path = screenshot
    color = rgba(0a1628b8)
    blur_passes = 2
    blur_size = 4
}

# ── Time (large) ─────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    font_size = 96
    font_family = Inter Bold
    color = rgba(244, 247, 251, 0.95)
    position = 0, 240
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_boost = 1.2
}

# ── Date ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %-d %B %Y')"
    font_size = 18
    font_family = Inter
    color = rgba(244, 247, 251, 0.72)
    position = 0, 152
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ── User name ────────────────────────────────────────────────────────────────
label {
    monitor =
    text = $USER
    font_size = 14
    font_family = Inter SemiBold
    color = rgba(176, 212, 255, 0.85)
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ── Password input ───────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 52
    position = 0, -120
    halign = center
    valign = center
    outline_thickness = 3
    dots_size = 0.28
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(10, 22, 40, 0.60)
    outer_color = rgba(30, 111, 255, 0.80)
    font_color = rgb(244, 247, 251)
    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text = <span foreground="#7AADFF"><i>Enter password…</i></span>
    rounding = 14
    check_color = rgb(91, 192, 235)
    fail_color = rgb(255, 107, 107)
    fail_text = <i>  Wrong password</i>
    fail_timeout = 2000
    capslock_color = rgb(255, 180, 84)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
}

# ── Hint label ───────────────────────────────────────────────────────────────
label {
    monitor =
    text = Press Enter to unlock
    font_size = 11
    font_family = Inter
    color = rgba(122, 173, 255, 0.50)
    position = 0, -182
    halign = center
    valign = center
}

# ── Media info (bottom left) — shows currently playing track ─────────────────
label {
    monitor =
    text = cmd[update:5000] playerctl metadata --format '󰎇  {{ artist }} — {{ title }}' 2>/dev/null || echo ''
    font_size = 12
    font_family = Inter
    color = rgba(176, 212, 255, 0.65)
    position = 28, 56
    halign = left
    valign = bottom
    max_length = 60
    shadow_passes = 1
    shadow_color = rgba(0,0,0,0.5)
}

# ── Battery (bottom left, below media) ───────────────────────────────────────
label {
    monitor =
    text = cmd[update:30000] bash -c 'BAT=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); STATUS=$(cat /sys/class/power_supply/BAT*/status 2>/dev/null | head -1); [ -z "$BAT" ] && exit 0; if [ "$STATUS" = "Charging" ]; then echo "󰂄  ${BAT}%"; elif [ "$BAT" -le 20 ]; then echo "󰂎  ${BAT}%"; elif [ "$BAT" -le 50 ]; then echo "󰁾  ${BAT}%"; elif [ "$BAT" -le 80 ]; then echo "󰂀  ${BAT}%"; else echo "󰁹  ${BAT}%"; fi'
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    color = rgba(176, 212, 255, 0.60)
    position = 28, 28
    halign = left
    valign = bottom
    shadow_passes = 1
    shadow_color = rgba(0,0,0,0.5)
}

# ── Uptime (bottom right) ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "󰒲  $(uptime -p | sed 's/up //')"
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    color = rgba(122, 173, 255, 0.45)
    position = -28, 28
    halign = right
    valign = bottom
    shadow_passes = 1
    shadow_color = rgba(0,0,0,0.4)
}
