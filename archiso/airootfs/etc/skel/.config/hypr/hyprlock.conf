background {
    monitor =
    path = /usr/share/torrentos/branding/wallpaper.png
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.85
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 320, 56
    position = 0, -120
    halign = center
    valign = center
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    inner_color = rgba(10, 22, 40, 0.55)
    outer_color = rgba(30, 111, 255, 0.85)
    font_color = rgb(244, 247, 251)
    fade_on_empty = true
    placeholder_text = <i>Password…</i>
    rounding = 16
    check_color = rgb(91, 192, 235)
    fail_color = rgb(255, 107, 107)
    fail_text = <i>$FAIL</i>
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    font_size = 96
    font_family = Inter Bold
    color = rgba(244, 247, 251, 0.95)
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %-d')"
    font_size = 18
    font_family = Inter
    color = rgba(244, 247, 251, 0.75)
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = Inter
    color = rgba(244, 247, 251, 0.6)
    position = 0, -60
    halign = center
    valign = center
}
