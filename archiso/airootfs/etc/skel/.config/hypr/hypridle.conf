# TorrentOS — Hypridle configuration
# Dims screen → locks → turns off display → suspends

general {
    lock_cmd               = pidof hyprlock || hyprlock
    before_sleep_cmd       = loginctl lock-session
    after_sleep_cmd        = hyprctl dispatch dpms on
    ignore_dbus_inhibit    = false
    ignore_systemd_inhibit = false
}

# ── 2 min 30 sec: dim display to 40% brightness ─────────────────────────────
listener {
    timeout    = 150
    on-timeout = brightnessctl -s set 40%
    on-resume  = brightnessctl -r
}

# ── 5 min: lock screen ───────────────────────────────────────────────────────
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
    on-resume  = brightnessctl -r   # restore brightness if lock is dismissed quickly
}

# ── 5 min 30 sec: turn off display after lock ────────────────────────────────
listener {
    timeout    = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── 30 min: suspend to RAM ───────────────────────────────────────────────────
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
