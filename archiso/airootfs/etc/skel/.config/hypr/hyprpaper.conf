preload = /usr/share/torrentos/branding/wallpaper.png

# Apply wallpaper to all connected monitors (empty monitor name = all)
wallpaper = ,/usr/share/torrentos/branding/wallpaper.png

# Uncomment and add your monitor names for per-monitor wallpapers.
# Run 'hyprctl monitors' to list connected monitor names.
# wallpaper = DP-1,/usr/share/torrentos/branding/wallpaper.png
# wallpaper = HDMI-A-1,/usr/share/torrentos/branding/wallpaper.png

splash = false
ipc = on
