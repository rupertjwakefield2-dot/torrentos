# TorrentOS macOS-style touchpad gestures.
# Format: gesture <type> <fingers> [direction] <command>
# Requires: libinput-gestures (auto-started by Hyprland)
# Run 'libinput-gestures-setup restart' to apply changes.

# ── 4-finger horizontal swipe — switch workspaces ────────────────────────────
# macOS Mission Control feel: swipe left goes to next workspace, right to previous
gesture swipe left  4 hyprctl dispatch workspace e+1
gesture swipe right 4 hyprctl dispatch workspace e-1

# ── 3-finger horizontal swipe — move current window to adjacent workspace ────
gesture swipe left  3 hyprctl dispatch movetoworkspace e+1
gesture swipe right 3 hyprctl dispatch movetoworkspace e-1

# ── 4-finger swipe up — open app launcher (Spotlight) ────────────────────────
gesture swipe up    4 bash -c 'rofi -show drun -theme ~/.config/rofi/torrentos.rasi'

# ── 4-finger swipe down — toggle notification centre ─────────────────────────
gesture swipe down  4 swaync-client -t -sw

# ── 3-finger swipe up — show scratchpad / special workspace ──────────────────
gesture swipe up    3 hyprctl dispatch togglespecialworkspace

# ── 3-finger swipe down — close scratchpad ───────────────────────────────────
gesture swipe down  3 hyprctl dispatch togglespecialworkspace

# ── Pinch (2-finger) — zoom in/out in supported apps ─────────────────────────
# These are handled natively by apps; libinput-gestures passes them through.
# Uncomment to map pinch to something custom:
# gesture pinch in  2 hyprctl dispatch exec 'wtype -M ctrl -k minus'
# gesture pinch out 2 hyprctl dispatch exec 'wtype -M ctrl -k equal'
