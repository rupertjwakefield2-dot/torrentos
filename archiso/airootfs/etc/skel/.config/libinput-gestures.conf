# TorrentOS macOS-style touchpad gestures.
# Format: gesture <type> <fingers> [direction] <command>

# 4-finger horizontal swipe — switch workspaces (macOS Mission Control feel)
gesture swipe left  4 hyprctl dispatch workspace e+1
gesture swipe right 4 hyprctl dispatch workspace e-1

# 3-finger swipe up — show overview / scratchpad
gesture swipe up    3 hyprctl dispatch togglespecialworkspace overview
gesture swipe down  3 hyprctl dispatch togglespecialworkspace overview

# Pinch to close window
gesture pinch in    hyprctl dispatch killactive
