# TorrentOS — tmux configuration
# macOS-feel keybinds with TorrentOS blue colour scheme

# ── Prefix key ───────────────────────────────────────────────────────────────
# Keep Ctrl+B as prefix but also allow Ctrl+Space
set -g prefix C-b
bind C-b send-prefix
bind C-Space send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /usr/bin/zsh

set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g mouse on
set -g escape-time 10
set -g repeat-time 300
set -g focus-events on
set -g display-time 2000
set -g display-panes-time 2000
set -g status-interval 5

# ── Window / pane titles ─────────────────────────────────────────────────────
set -g set-titles on
set -g set-titles-string "#S — tmux"
set -g automatic-rename on
set -g automatic-rename-format "#{?pane_in_mode,[tmux],#{pane_current_command}}"

# ── Keybinds ─────────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes — intuitive: | for vertical, - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New window keeping current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys (no prefix required after first press)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Navigate windows with Alt+[ and Alt+]
bind -n M-[ previous-window
bind -n M-] next-window

# Resize panes with prefix + hjkl
bind -r h resize-pane -L 5
bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 5

# Zoom pane toggle with prefix + z or prefix + f
bind z resize-pane -Z
bind f resize-pane -Z

# Kill pane/window without confirmation prompt
bind x kill-pane
bind Q kill-window

# Move windows with Shift+arrow
bind -n S-Left  swap-window -t -1 \; previous-window
bind -n S-Right swap-window -t +1 \; next-window

# Copy mode — vim bindings
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# Paste from Wayland clipboard
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer"

# ── Status bar ───────────────────────────────────────────────────────────────
# TorrentOS blue palette: navy #0A1628, blue #1E6FFF, text #F4F7FB

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#0A1628,fg=#F4F7FB"

# Left: session name
set -g status-left-length 32
set -g status-left "#[bg=#1E6FFF,fg=#F4F7FB,bold] #S #[bg=#0A1628,fg=#1E6FFF]"

# Right: CPU-free view — date/time and host
set -g status-right-length 64
set -g status-right "#[fg=#7AADFF,dim]  %a %-d %b  #[fg=#5BC0EB,bold]%H:%M #[fg=#1E6FFF]#[bg=#1E6FFF,fg=#F4F7FB,bold] #h "

# Window list
setw -g window-status-format         " #I:#W#{?window_zoomed_flag, ,} "
setw -g window-status-current-format "#[bg=#1E6FFF,fg=#F4F7FB,bold] #I:#W#{?window_zoomed_flag, ,} #[bg=#0A1628,fg=#1E6FFF]"
setw -g window-status-style          "fg=#7AADFF"
setw -g window-status-current-style  "fg=#F4F7FB"
setw -g window-status-separator      ""

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#1a2744"
set -g pane-active-border-style "fg=#1E6FFF"
set -g pane-border-lines        single

# ── Messages ─────────────────────────────────────────────────────────────────
set -g message-style       "bg=#1E6FFF,fg=#F4F7FB,bold"
set -g message-command-style "bg=#0e1c37,fg=#7AADFF"

# ── Copy mode highlight ───────────────────────────────────────────────────────
setw -g mode-style "bg=#1E6FFF,fg=#F4F7FB"
