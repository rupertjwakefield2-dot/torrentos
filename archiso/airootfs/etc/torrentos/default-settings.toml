# TorrentOS — shipped default settings.
# Read by torrentos-settingsd at boot. Replaced on update.
# User overrides live in ~/.config/torrentos/settings.toml.

[appearance]
theme = "dark"          # "light" | "dark" | "auto"
accent = "#1E6FFF"
wallpaper = "/usr/share/torrentos/branding/wallpaper.png"
icon-theme = "Papirus-Dark"
cursor-theme = "Bibata-Modern-Classic"
font-size = 11
animations = true
blur = true
rounding = 12

[accessibility]
high-contrast = false
screen-reader = false
magnifier = false
ui-scale = 1.0
sticky-keys = false
slow-keys = false
mouse-keys = false
live-captions = false
color-filter = "none"   # "none" | "protanopia" | "deuteranopia" | "tritanopia"

[keyboard]
layout = "gb"
repeat-delay = 300
repeat-rate = 50
numlock = true
natural-scroll = true
tap-to-click = true
mouse-sensitivity = 0.0

[display]
night-light = false
night-light-temp = 4000
scale = "1"             # string — "1", "1.25", "1.5", "1.75", "2", "2.5", "3"
custom-scale = 0.0      # 0.0 = use preset above
refresh-rate = "auto"
vrr = false
overscan = 0

[network]
proxy-enabled = false
proxy = ""

[dev-mode]
enabled = false

[ai]
provider = "off"        # "off" | "claude" | "ollama"

[telemetry]
enabled = false
